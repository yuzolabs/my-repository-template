version: '3.8'

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      # opencode認証ファイルのみマウント
      - ${HOME}/.local/share/opencode/auth.json:/home/node/.local/share/opencode/auth.json:ro
    environment:
      - UV_LINK_MODE=copy
      - GH_TOKEN=${GH_TOKEN:-}
      # メインリポジトリとworktreesのパスを環境変数として渡す
      - MAIN_REPO_PATH=/workspaces/my-repository-template
      - WORKTREES_PATH=/workspaces/my-repository-template.worktrees
    command: sleep infinity
