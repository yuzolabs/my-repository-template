services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      # opencode認証ファイルのみマウント
      - ${HOME}/.local/share/opencode/auth.json:/home/node/.local/share/opencode/auth.json:ro
      - bun-cache:/home/node/.bun/install/cache
      - uv-cache:/home/node/.cache/uv
      - node-modules-cache:/workspace/node_modules
    environment:
      - UV_LINK_MODE=copy
      - GH_TOKEN=${GH_TOKEN:-}
      # メインリポジトリとworktreesのパスを環境変数として渡す
      - MAIN_REPO_PATH=${MAIN_REPO_PATH:-/workspaces/my-repository-template}
      - WORKTREES_PATH=${WORKTREES_PATH:-/workspaces/my-repository-template.worktrees}
    command: sleep infinity

volumes:
  bun-cache:
  uv-cache:
  node-modules-cache:
